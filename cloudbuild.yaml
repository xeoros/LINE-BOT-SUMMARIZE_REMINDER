steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_IMAGE_URI}
      - .

images:
  - ${_IMAGE_URI}

options:
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET

substitutions:
  _IMAGE_URI: us-central1-docker.pkg.dev/$PROJECT_ID/line-bot/line-bot-summarize:$COMMIT_SHA
