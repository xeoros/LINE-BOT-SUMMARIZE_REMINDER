steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-southeast1-docker.pkg.dev/$PROJECT_ID/line-bot/line-bot-summarize:$COMMIT_SHA
      - .

images:
  - asia-southeast1-docker.pkg.dev/$PROJECT_ID/line-bot/line-bot-summarize:$COMMIT_SHA

options:
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
